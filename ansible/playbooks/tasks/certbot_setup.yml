---
# 1. 80번 포트 충돌 방지를 위해 기존 도커 컨테이너 중지
- name: Stop Docker container to free port 80
  community.docker.docker_container:
    name: web_server
    state: stopped
  ignore_errors: yes

# 2. Certbot 및 Nginx 플러그인 설치
- name: Install Certbot and python3-certbot-nginx
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

# 3. SSL 인증서 발급 및 Nginx 설정 자동화
- name: Request SSL Certificate and configure Nginx
  ansible.builtin.shell: >
    certbot --nginx 
    -d jinwooksite.duckdns.org 
    --non-interactive 
    --agree-tos 
    -m dlwlsdnr24@gmail.com 
    --redirect
  args:
    creates: /etc/letsencrypt/live/jinwooksite.duckdns.org/fullchain.pem

# 4. 인증서 자동 갱신 확인 (선택 사항이지만 권장)
- name: Ensure Certbot renewal timer is running
  ansible.builtin.systemd:
    name: certbot.timer
    state: started
    enabled: yes

# 5. 인증서 갱신 후 Nginx와 Docker를 자동으로 재시작하는 훅(Hook) 설정
- name: Configure Certbot renewal hook to reload services
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-services.sh
    content: |
      #!/bin/bash
      systemctl reload nginx
      # 도커 컨테이너도 최신 인증서를 반영해야 한다면 재시작
      # docker restart web_server
    mode: '0755'